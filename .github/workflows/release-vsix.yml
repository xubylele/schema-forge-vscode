name: Release Extension

on:
  push:
    branches:
      - master
      - pre-release
    paths:
      - package.json
      - CHANGELOG.md
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Package VSIX
        run: npx vsce package

      - name: Publish VS Code Pre-release
        if: github.ref_name == 'pre-release'
        run: npx vsce publish --pre-release
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish VS Code Stable
        if: github.ref_name == 'master'
        run: npx vsce publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: schema-forge-vsix-${{ github.ref_name }}-${{ github.sha }}
          path: "*.vsix"
