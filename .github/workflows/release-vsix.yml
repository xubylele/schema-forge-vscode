name: Release Extension

on:
  push:
    branches:
      - master
    paths:
      - package.json
      - CHANGELOG.md
  workflow_dispatch:

jobs:
  release:
    name: Build, Lint, Package, and Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Package VSIX
        run: npx vsce package

      - name: Publish VS Code Stable
        if: github.ref_name == 'master'
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 5
          retry_wait_seconds: 60
          command: npx vsce publish --pat ${{ secrets.VSCE_PAT }} --no-update-package-json --no-wait-for-warnings
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: schema-forge-vsix-${{ github.ref_name }}-${{ github.sha }}
          path: "*.vsix"
