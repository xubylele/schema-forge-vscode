name: Changesets Check

on:
  pull_request:
    branches:
      - develop

jobs:
  check:
    name: Check pending changesets
    runs-on: ubuntu-latest
    if: ${{ github.head_ref != 'main' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate pending changesets
        run: |
          output=$(npx changeset status --since=origin/${{ github.base_ref }} --verbose)
          echo "$output"
          if echo "$output" | grep -qE "(major|minor|patch)"; then
            exit 0
          else
            echo "No version bump found in changesets"
            exit 1
          fi
